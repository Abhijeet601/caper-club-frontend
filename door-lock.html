<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaperClub — Smart Door Lock</title>
  <meta name="description" content="Real-time face-detection door lock system powered by ESP32 and FastAPI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --border:    rgba(255,255,255,.08);
      --accent:    #6366f1;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
      --radius:    16px;
      --glow-g:    0 0 32px rgba(34,197,94,.35);
      --glow-r:    0 0 32px rgba(239,68,68,.35);
      --glow-a:    0 0 24px rgba(99,102,241,.4);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg,#6366f1,#a855f7);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 20px;
    }
    .logo h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.3px; }
    .logo p  { font-size: .75rem; color: var(--muted); margin-top: 1px; }

    /* ── Status badge ─────────────────────────────────── */
    #status-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: .8rem; font-weight: 600; letter-spacing: .3px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all .4s ease;
    }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--muted);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    #status-badge.locked   { border-color: var(--red);   color: var(--red);   box-shadow: var(--glow-r); }
    #status-badge.locked   .dot { background: var(--red); }
    #status-badge.unlocked { border-color: var(--green); color: var(--green); box-shadow: var(--glow-g); }
    #status-badge.unlocked .dot { background: var(--green); }
    #status-badge.loading  { border-color: var(--amber); color: var(--amber); }
    #status-badge.loading  .dot { background: var(--amber); }

    /* ── Main grid ────────────────────────────────────── */
    .grid {
      width: 100%; max-width: 860px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Card ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .card-title {
      font-size: .75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Camera ───────────────────────────────────────── */
    .cam-wrapper {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
    }
    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1); /* mirror */
    }
    #overlay {
      position: absolute; inset: 0;
      transform: scaleX(-1);
      pointer-events: none;
    }

    /* Face ring */
    .face-ring {
      position: absolute; inset: 0;
      pointer-events: none;
      transition: opacity .4s;
      opacity: 0;
    }
    .face-ring.visible { opacity: 1; }
    .face-ring::before, .face-ring::after {
      content: '';
      position: absolute;
      border-radius: 50%;
    }
    /* glow behind video */
    .cam-glow {
      position: absolute; inset: -4px;
      border-radius: 14px;
      transition: box-shadow .5s ease;
      pointer-events: none;
      z-index: 1;
    }
    .cam-glow.green { box-shadow: inset 0 0 0 3px var(--green), var(--glow-g); }
    .cam-glow.red   { box-shadow: inset 0 0 0 3px var(--red),   var(--glow-r); }
    .cam-glow.idle  { box-shadow: inset 0 0 0 1px rgba(255,255,255,.1); }

    /* ── Info panel ───────────────────────────────────── */
    .side { display: flex; flex-direction: column; gap: 16px; }

    /* Door visual */
    .door-visual {
      text-align: center;
      padding: 24px 0 20px;
    }
    .door-icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 10px;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
    }
    .door-icon.open { transform: rotateY(-30deg) scale(1.1); }
    .door-label {
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: -.5px;
    }
    .door-sub {
      font-size: .78rem; color: var(--muted);
      margin-top: 4px;
    }

    /* Stats */
    .stat-row {
      display: flex; justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: .82rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--muted); }
    .stat-value { font-weight: 600; }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.amber { color: var(--amber); }

    /* Activity log */
    #log-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    #log-list li {
      font-size: .75rem;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; align-items: baseline;
      color: var(--muted);
    }
    #log-list li:last-child { border: none; }
    #log-list li .ts { color: #475569; flex-shrink: 0; font-size: .7rem; }
    #log-list li .msg.ok  { color: var(--green); }
    #log-list li .msg.err { color: var(--red); }
    #log-list li .msg.info{ color: var(--accent); }

    /* Controls */
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 100px;
      padding: 10px 14px;
      border: none; border-radius: 10px;
      font-size: .82rem; font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn.primary  { background: var(--accent); color: #fff; }
    .btn.danger   { background: var(--red);    color: #fff; }
    .btn.success  { background: var(--green);  color: #fff; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Config section */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 5px; }
    .field input {
      width: 100%;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .82rem;
      font-family: monospace;
      outline: none;
      transition: border-color .2s;
    }
    .field input:focus { border-color: var(--accent); }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: .82rem; font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transition: opacity .3s, transform .3s;
      opacity: 0; transform: translateY(8px);
      pointer-events: none;
      max-width: 280px;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: none; }
    #toast.ok  { border-color: var(--green); color: var(--green); }
    #toast.err { border-color: var(--red);   color: var(--red); }

    /* Loading overlay */
    #init-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 9999;
      transition: opacity .5s;
    }
    #init-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #init-msg { font-size: .9rem; color: var(--muted); }
  </style>
</head>
<body>

<!-- Init overlay -->
<div id="init-overlay">
  <div class="spinner"></div>
  <p id="init-msg">Loading face models…</p>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <div>
      <h1>Smart Door Lock</h1>
      <p>CaperClub Access Control</p>
    </div>
  </div>
  <div id="status-badge" class="loading">
    <div class="dot"></div>
    <span id="status-text">Initialising…</span>
  </div>
</header>

<!-- Main -->
<div class="grid">

  <!-- Camera card -->
  <div class="card">
    <p class="card-title">📷 Live Camera Feed</p>
    <div class="cam-wrapper">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
      <div class="cam-glow idle" id="cam-glow"></div>
    </div>
  </div>

  <!-- Side panel -->
  <div class="side">

    <!-- Door status -->
    <div class="card">
      <p class="card-title">🚪 Door Status</p>
      <div class="door-visual">
        <div class="door-icon" id="door-icon">🔒</div>
        <div class="door-label" id="door-label">LOCKED</div>
        <div class="door-sub"  id="door-sub">No face detected</div>
      </div>
      <div class="stat-row">
        <span class="stat-label">Detection</span>
        <span class="stat-value" id="stat-detection">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Last command</span>
        <span class="stat-value" id="stat-command">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">API ping</span>
        <span class="stat-value" id="stat-ping">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Face score</span>
        <span class="stat-value" id="stat-score">—</span>
      </div>
    </div>

    <!-- Manual controls -->
    <div class="card">
      <p class="card-title">🎛️ Manual Override</p>
      <div class="btn-row">
        <button class="btn success" id="btn-unlock">🔓 Unlock</button>
        <button class="btn danger"  id="btn-lock">🔒 Lock</button>
      </div>
    </div>

    <!-- Config -->
    <div class="card">
      <p class="card-title">⚙️ Configuration</p>
      <div class="field">
        <label>Backend URL</label>
        <input type="text" id="cfg-url" placeholder="https://your-app.up.railway.app" />
      </div>
      <div class="field">
        <label>API Key (X-Door-Key)</label>
        <input type="text" id="cfg-key" placeholder="caperclub-door-2026" />
      </div>
      <div class="btn-row">
        <button class="btn primary" id="btn-save-cfg">💾 Save & Apply</button>
      </div>
    </div>

    <!-- Activity log -->
    <div class="card">
      <p class="card-title">📋 Activity Log</p>
      <ul id="log-list"></ul>
    </div>

  </div>
</div>

<!-- face-api.js from vendor folder -->
<script src="vendor/face-api.min.js"></script>
<script>
'use strict';

// ─── Config (editable via UI, persisted to localStorage) ───────────────────
const CFG_KEY = 'door_lock_config';

function loadConfig() {
  try {
    const raw = localStorage.getItem(CFG_KEY);
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return {
    backendUrl: '',
    doorApiKey: 'caperclub-door-2026',
  };
}
function saveConfig(cfg) {
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
}

let cfg = loadConfig();

// Populate fields
document.getElementById('cfg-url').value = cfg.backendUrl;
document.getElementById('cfg-key').value = cfg.doorApiKey;

document.getElementById('btn-save-cfg').addEventListener('click', () => {
  cfg.backendUrl  = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  cfg.doorApiKey  = document.getElementById('cfg-key').value.trim();
  saveConfig(cfg);
  toast('Config saved ✓', 'ok');
  addLog('Config updated', 'info');
});

// ─── Utility ───────────────────────────────────────────────────────────────
function ts() {
  return new Date().toLocaleTimeString('en-IN', { hour12: false });
}

function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 2800);
}

function addLog(msg, type = '') {
  const li   = document.createElement('li');
  const time = document.createElement('span');
  time.className = 'ts';
  time.textContent = ts();
  const text = document.createElement('span');
  text.className = `msg ${type}`;
  text.textContent = msg;
  li.append(time, text);
  const list = document.getElementById('log-list');
  list.prepend(li);
  // Keep max 50 entries
  while (list.children.length > 50) list.lastChild.remove();
}

function setInitMsg(msg) {
  document.getElementById('init-msg').textContent = msg;
}

// ─── Door state UI ─────────────────────────────────────────────────────────
let currentDoorState = 'LOCK'; // 'LOCK' | 'UNLOCK'

function applyDoorUI(command) {
  const icon  = document.getElementById('door-icon');
  const label = document.getElementById('door-label');
  const glow  = document.getElementById('cam-glow');
  const badge = document.getElementById('status-badge');
  const btext = document.getElementById('status-text');
  currentDoorState = command;

  if (command === 'UNLOCK') {
    icon.textContent  = '🔓';
    icon.classList.add('open');
    label.textContent = 'UNLOCKED';
    glow.className    = 'cam-glow green';
    badge.className   = 'unlocked';
    btext.textContent = 'Door Unlocked';
    document.getElementById('stat-command').className = 'stat-value green';
    document.getElementById('stat-command').textContent = 'UNLOCK';
  } else {
    icon.textContent  = '🔒';
    icon.classList.remove('open');
    label.textContent = 'LOCKED';
    glow.className    = 'cam-glow red';
    badge.className   = 'locked';
    btext.textContent = 'Door Locked';
    document.getElementById('stat-command').className = 'stat-value red';
    document.getElementById('stat-command').textContent = 'LOCK';
  }
}

// ─── Backend API calls ─────────────────────────────────────────────────────
async function callDoorApi(endpoint) {
  const url = `${cfg.backendUrl}/door/${endpoint}`;
  const t0  = Date.now();
  try {
    const res = await fetch(url, {
      method: endpoint === 'status' ? 'GET' : 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Door-Key': cfg.doorApiKey,
      },
    });
    const ping = Date.now() - t0;
    document.getElementById('stat-ping').textContent = `${ping} ms`;

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    return await res.json();
  } catch (err) {
    document.getElementById('stat-ping').textContent = 'error';
    throw err;
  }
}

async function sendUnlock() {
  try {
    await callDoorApi('unlock');
    applyDoorUI('UNLOCK');
    addLog('UNLOCK sent to backend', 'ok');
  } catch (err) {
    addLog(`Unlock failed: ${err.message}`, 'err');
    toast(`Unlock failed: ${err.message}`, 'err');
  }
}

async function sendLock() {
  try {
    await callDoorApi('lock');
    applyDoorUI('LOCK');
    addLog('LOCK sent to backend', 'err');
  } catch (err) {
    addLog(`Lock failed: ${err.message}`, 'err');
    toast(`Lock failed: ${err.message}`, 'err');
  }
}

document.getElementById('btn-unlock').addEventListener('click', sendUnlock);
document.getElementById('btn-lock').addEventListener('click', sendLock);

// ─── Face detection loop ───────────────────────────────────────────────────
const video   = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx     = overlay.getContext('2d');

let modelsLoaded  = false;
let lastFaceTime  = 0;          // epoch ms of last face detection
const LOCK_AFTER_MS = 4000;     // lock if no face for 4 s
let pendingCommand = null;       // 'UNLOCK' | 'LOCK' — deduplicate API calls
let detecting     = false;

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  overlay.width  = video.videoWidth;
  overlay.height = video.videoHeight;
  addLog('Camera started', 'info');
}

async function loadFaceModels() {
  const MODEL_URL = 'models';
  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
  ]);
  addLog('Face models loaded', 'info');
}

async function detectFaces() {
  if (detecting || !modelsLoaded || !video.videoWidth) return;
  detecting = true;

  try {
    const options = new faceapi.TinyFaceDetectorOptions({
      inputSize: 320,
      scoreThreshold: 0.5,
    });

    const detections = await faceapi
      .detectAllFaces(video, options)
      .withFaceLandmarks(true);

    const now = Date.now();

    // Draw overlays
    ctx.clearRect(0, 0, overlay.width, overlay.height);

    if (detections.length > 0) {
      // Draw bounding boxes
      const resized = faceapi.resizeResults(detections, {
        width: overlay.width, height: overlay.height,
      });
      resized.forEach(det => {
        const box = det.detection.box;
        const score = det.detection.score;
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth   = 2.5;
        ctx.shadowColor = '#22c55e';
        ctx.shadowBlur  = 12;
        ctx.strokeRect(box.x, box.y, box.width, box.height);
        ctx.shadowBlur = 0;
        ctx.fillStyle  = 'rgba(34,197,94,.12)';
        ctx.fillRect(box.x, box.y, box.width, box.height);
        // Score label
        ctx.fillStyle  = '#22c55e';
        ctx.font       = 'bold 13px Inter, sans-serif';
        ctx.fillText(`Face ${(score * 100).toFixed(0)}%`, box.x + 4, box.y - 6);
      });

      document.getElementById('stat-detection').className = 'stat-value green';
      document.getElementById('stat-detection').textContent = `${detections.length} face(s)`;
      document.getElementById('stat-score').textContent =
        `${(detections[0].detection.score * 100).toFixed(1)}%`;
      document.getElementById('door-sub').textContent = 'Face detected — unlocking';

      lastFaceTime = now;

      if (pendingCommand !== 'UNLOCK') {
        pendingCommand = 'UNLOCK';
        sendUnlock();
      }

    } else {
      document.getElementById('stat-detection').className = 'stat-value red';
      document.getElementById('stat-detection').textContent = 'No face';
      document.getElementById('stat-score').textContent = '—';

      const elapsed = now - lastFaceTime;
      if (lastFaceTime > 0 && elapsed >= LOCK_AFTER_MS && pendingCommand !== 'LOCK') {
        pendingCommand = 'LOCK';
        document.getElementById('door-sub').textContent = 'No face — locking';
        sendLock();
      } else if (lastFaceTime === 0) {
        document.getElementById('door-sub').textContent = 'Scanning for faces…';
        if (pendingCommand !== 'LOCK') {
          pendingCommand = 'LOCK';
          sendLock();
        }
      } else {
        const remaining = Math.max(0, Math.ceil((LOCK_AFTER_MS - elapsed) / 1000));
        document.getElementById('door-sub').textContent =
          `Face gone — locking in ${remaining}s`;
      }
    }
  } catch (err) {
    addLog(`Detection error: ${err.message}`, 'err');
  } finally {
    detecting = false;
  }
}

// ─── Boot sequence ─────────────────────────────────────────────────────────
(async () => {
  const overlay_el = document.getElementById('init-overlay');

  try {
    setInitMsg('Loading face detection models…');
    await loadFaceModels();
    modelsLoaded = true;

    setInitMsg('Starting camera…');
    await startCamera();

    // Check backend connectivity
    if (cfg.backendUrl) {
      try {
        setInitMsg('Connecting to backend…');
        const data = await callDoorApi('status');
        applyDoorUI(data.command || 'LOCK');
        addLog(`Backend connected — current state: ${data.command}`, 'ok');
        toast('Backend connected ✓', 'ok');
      } catch (err) {
        addLog(`Backend unreachable: ${err.message}`, 'err');
        toast('Backend unreachable — check config', 'err');
        document.getElementById('status-badge').className = 'loading';
        document.getElementById('status-text').textContent = 'Backend offline';
      }
    } else {
      addLog('No backend URL — set it in Configuration', 'err');
      toast('Enter your backend URL in Configuration ⬇', 'err');
      document.getElementById('status-badge').className = 'loading';
      document.getElementById('status-text').textContent = 'No backend URL';
    }

    // Dismiss loading screen
    overlay_el.classList.add('hidden');
    setTimeout(() => overlay_el.remove(), 600);

    // Start detection loop (every 600 ms)
    setInterval(detectFaces, 600);

    addLog('System ready', 'info');

  } catch (err) {
    setInitMsg(`Error: ${err.message}`);
    addLog(`Boot error: ${err.message}`, 'err');
  }
})();
</script>
</body>
</html>
